<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hazel Check">
  <title>Hazel Check</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
    :root {
      --bg:#12100B; --surface:#1B1813; --surf2:#232018; --surf3:#2A2620;
      --text:#EEE8DC; --dim:#9A8E7E; --faint:#5A5248; --border:#2B2720;
      --gold:#D4A853;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--text);font-family:'Pretendard Variable','Pretendard',sans-serif;min-height:100svh;padding-bottom:150px;overflow-x:hidden;}
    header{position:sticky;top:0;z-index:20;background:var(--bg);padding:calc(env(safe-area-inset-top) + 18px) 16px 12px;}
    .hdr-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .app-name{font-size:20px;font-weight:700;color:var(--text);}
    .app-name em{color:var(--gold);font-style:normal;}
    .streak-pill{background:rgba(212,168,83,0.1);border:1px solid rgba(212,168,83,0.2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--gold);font-weight:600;}
    .prog-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:10px;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#C4898B);transition:width 0.5s ease;}
    #listView{padding:10px 16px;display:flex;flex-direction:column;gap:12px;}
    .sec-card{background:var(--surface);border-radius:18px;padding:14px;border:1px solid var(--border);}
    .sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .sec-name{font-size:14px;font-weight:700;flex:1;}
    .item-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
    .item-li{display:flex;align-items:center;gap:10px;font-size:15px;}
    .item-box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--col);flex-shrink:0;cursor:pointer;}
    .item-li.done .item-box{background:var(--col);}
    .item-li.done .item-label{color:var(--dim);text-decoration:line-through;}
    .footer-bar{position:fixed;bottom:0;left:0;right:0;padding:16px;padding-bottom:calc(env(safe-area-inset-bottom) + 16px);background:linear-gradient(to top,var(--bg) 80%,transparent);display:flex;gap:12px;z-index:100;}
    .footer-btn{flex:1;padding:16px;border-radius:16px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:transform 0.1s;}
    .btn-cert{background:var(--surf3);color:var(--text);border:1px solid var(--border);}
    .btn-reset{background:var(--gold);color:#12100B;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:flex-end;padding:16px;}
    .overlay.show{display:flex;}
    .sheet{width:100%;background:#1E1C17;border-radius:24px;padding:24px;max-height:80svh;overflow-y:auto;}
    .sheet-preview{background:#2a2520;border-radius:12px;padding:16px;font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;margin:16px 0;font-family:monospace;border:1px solid var(--border);}
    .sheet-ok{width:100%;padding:16px;background:var(--gold);border:none;border-radius:12px;font-weight:700;cursor:pointer;}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surf3);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:300;}
    .toast.show{opacity:1;}
  </style>
</head>
<body>
<header>
  <div class="hdr-row1">
    <div class="app-name">Hazel <em>Check</em></div>
    <div class="streak-pill">🔥 <span id="streakNum">0</span>일째</div>
  </div>
  <div id="dateLbl" style="font-size:11px;color:var(--dim);"></div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</header>

<div id="listView"></div>

<div class="footer-bar">
  <button class="footer-btn btn-cert" id="certBtn">📋 오늘의 인증</button>
  <button class="footer-btn btn-reset" id="resetBtn">🌅 하루 시작</button>
</div>

<div class="toast" id="toast">복사 완료! 🎉</div>

<div class="overlay" id="certOverlay">
  <div class="sheet">
    <div style="font-weight:700;font-size:18px;">인증 내용 미리보기</div>
    <div class="sheet-preview" id="certPreview"></div>
    <button class="sheet-ok" id="certCopy">📋 복사하기</button>
    <div id="certCancel" style="text-align:center;margin-top:16px;color:var(--dim);font-size:14px;cursor:pointer;">취소</div>
  </div>
</div>

<script type="module">
  let sections = JSON.parse(localStorage.getItem('hz_sections')) || [
    {key:'work', name:'Work', emoji:'💼', col:'#D4A853', items:[{id:'1',text:'Vender checks'}]},
    {key:'routine', name:'일상·루틴', emoji:'🦋', col:'#C4898B', items:[{id:'2',text:'물 3잔마시기'},{id:'3',text:'중량스트레칭'}]}
  ];
  let checked = JSON.parse(localStorage.getItem('hz_checked')) || {};
  let todayPlan = JSON.parse(localStorage.getItem('hz_plan')) || null;

  const todayStr = () => {
    const d = new Date();
    return `${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  };

  function render() {
    const lv = document.getElementById('listView'); lv.innerHTML = '';
    sections.forEach(sec => {
      const card = document.createElement('div'); card.className = 'sec-card'; card.style.setProperty('--col', sec.col);
      let itemsHtml = '';
      sec.items.forEach(it => {
        const isDone = checked[it.id];
        itemsHtml += `<li class="item-li ${isDone?'done':''}"><div class="item-box" onclick="toggleCheck('${it.id}')"></div><span class="item-label">${it.text}</span></li>`;
      });
      card.innerHTML = `<div class="sec-head"><span class="sec-name">${sec.emoji} ${sec.name}</span></div><ul class="item-list">${itemsHtml}</ul>`;
      lv.appendChild(card);
    });
    const total = Object.values(checked).filter(Boolean).length;
    document.getElementById('progFill').style.width = (total/3*100) + '%';
    document.getElementById('dateLbl').textContent = new Date().toLocaleDateString();
  }

  window.toggleCheck = (id) => {
    if(checked[id]) delete checked[id]; else checked[id] = true;
    localStorage.setItem('hz_checked', JSON.stringify(checked));
    render();
  };

  // ═══ 하젤님 요청: 간결한 복사 기능 ═══
  document.getElementById('certBtn').onclick = () => {
    const doneCount = Object.keys(checked).length;
    const isClosing = doneCount > 0;
    const tag = isClosing ? "#완료한일" : "#해야할일";
    
    let msg = `#${todayStr()} ${tag}\n\n`;
    
    sections.forEach(sec => {
      // 마무리 모드면 완료된 것만, 시작 모드면 전부
      const showItems = isClosing ? sec.items.filter(it => checked[it.id]) : sec.items;
      
      if (showItems.length > 0) {
        msg += `${sec.emoji} ${sec.name}\n`;
        showItems.forEach(it => {
          const box = checked[it.id] ? '[V]' : '[ ]';
          msg += `${box} ${it.text}\n`;
        });
        msg += `\n`;
      }
    });

    document.getElementById('certPreview').textContent = msg.trim();
    document.getElementById('certOverlay').classList.add('show');
  };

  document.getElementById('certCopy').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('certPreview').textContent);
    document.getElementById('certOverlay').classList.remove('show');
    const t = document.getElementById('toast'); t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };

  document.getElementById('certCancel').onclick = () => document.getElementById('certOverlay').classList.remove('show');

  render();
</script>
</body>
</html>
