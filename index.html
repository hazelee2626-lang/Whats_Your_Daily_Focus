// 항목 추가 시 Notion에 생성
async function addToNotion(text, sectionName, itemId) {
  if (!currentUser || !WORKER_URL) return;
  try {
    const res = await fetch(`${WORKER_URL}/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: text, section: sectionName, itemId })
    });
    if (res.ok) {
      const data = await res.json();
      if (data.pageId && currentUser) {
        set(ref(db, `users/${currentUser.uid}/notionIds/${itemId}`), data.pageId).catch(() => {});
      }
    }
  } catch(e) { console.log('Notion sync skipped:', e.message); }
}

// 체크 상태 변경 시 Notion 업데이트
async function fbWriteCheck(itemId, isChecked, timestamp) {
  if (!currentUser) return;
  try {
    const uid = currentUser.uid;
    if (isChecked) {
      await set(ref(db, `users/${uid}/checked/${itemId}`), true);
      await set(ref(db, `users/${uid}/checkedTimes/${itemId}`), timestamp);
    } else {
      await remove(ref(db, `users/${uid}/checked/${itemId}`));
      await remove(ref(db, `users/${uid}/checkedTimes/${itemId}`));
    }
    
    // Notion 연동 부분
    const snap = await get(ref(db, `users/${uid}/notionIds/${itemId}`));
    const pageId = snap.val();
    if (pageId) {
      fetch(`${WORKER_URL}/update`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pageId, completed: isChecked })
      }).catch(() => {});
    }
  } catch(e) { showSyncStatus('⚠ 저장 실패'); }
}

// 삭제 시 Notion에서 아카이브(삭제)
async function doDelete(secKey, itemId) {
  const sec = sections.find(s => s.key === secKey);
  if (!sec) return;
  sec.items = sec.items.filter(it => it.id !== itemId);
  delete checked[itemId]; delete checkedTimes[itemId];
  
  LS.set('hz_sections', sections);
  LS.set('hz_checked', checked);
  
  // Firebase 데이터 삭제
  if (currentUser) {
    const uid = currentUser.uid;
    remove(ref(db, `users/${uid}/checked/${itemId}`));
    
    const snap = await get(ref(db, `users/${uid}/notionIds/${itemId}`));
    const pageId = snap.val();
    if (pageId) {
      fetch(`${WORKER_URL}/delete`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pageId })
      }).catch(() => {});
      remove(ref(db, `users/${uid}/notionIds/${itemId}`));
    }
  }
  
  render();
  updateHeader();
}
